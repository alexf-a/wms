{% if form.errors %}
<script>
// @ts-nocheck
document.addEventListener('DOMContentLoaded', function() {
    {% if reveal_form_section and form_section_id and form_card_id %}
    showFormSectionWithErrors("{{ form_section_id }}", "{{ form_card_id }}");
    {% endif %}
    {% for field, errors in form.errors.items %}
    {% for error in errors %}
    // Check for non-field errors
    {% if field == '__all__' %}
    showErrorSnackbar("{{ error|escapejs }}");
    {% else %}
    showErrorSnackbar("{{ field|title }}: {{ error|escapejs }}");
    {% endif %}
    {% endfor %}
    {% endfor %}
});
</script>
{% endif %}
