{# Delete Unit confirmation dialog. Warning adapts to item/child count. #}
<dialog id="delete-unit-dialog"
        class="w-full max-w-md rounded-lg border border-border bg-card p-0 text-card-foreground shadow-xl backdrop:bg-foreground/40
               open:animate-[dialog-in_200ms_ease-out]
               [&.dialog--closing]:animate-[dialog-out_150ms_ease-in]">
    <div class="px-6 py-5">
        <h2 class="text-lg font-semibold text-foreground">Delete Unit</h2>

        <input type="hidden" id="delete-unit-user-id">
        <input type="hidden" id="delete-unit-access-token">

        <p class="mt-3 text-sm text-foreground">
            Are you sure you want to delete <strong id="delete-unit-name" class="font-semibold"></strong>?
        </p>
        <p id="delete-unit-warning" class="mt-2 text-sm text-muted-foreground">
            Loading details...
        </p>

        <div class="mt-6 flex gap-3">
            <button type="button" id="delete-unit-cancel"
                    class="flex-1 rounded-md border border-border bg-background px-4 py-2.5 text-sm font-medium text-foreground hover:bg-accent">
                Cancel
            </button>
            <button type="button" id="delete-unit-submit"
                    class="flex-1 rounded-md bg-destructive px-4 py-2.5 text-sm font-medium text-destructive-foreground hover:bg-destructive/90 focus:outline-none focus:ring-2 focus:ring-destructive focus:ring-offset-2">
                Delete
            </button>
        </div>
    </div>
</dialog>
