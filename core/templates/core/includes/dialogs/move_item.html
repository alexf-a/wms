{# Move item dialog — pick a target unit for the item. #}
<dialog id="move-item-dialog"
        class="w-full max-w-md rounded-lg border border-border bg-card p-0 text-card-foreground shadow-xl backdrop:bg-foreground/40
               open:animate-[dialog-in_200ms_ease-out]
               [&.dialog--closing]:animate-[dialog-out_150ms_ease-in]">
    <div class="px-6 py-5">
        <h2 class="text-lg font-semibold text-foreground">Move Item</h2>
        <p class="mt-1 text-sm text-muted-foreground">
            Move <strong id="move-item-name" class="text-foreground"></strong> to a different unit.
        </p>

        <p id="move-item-error" class="mt-3 hidden rounded-lg bg-destructive/10 px-4 py-3 text-sm text-destructive" role="alert"></p>

        <div class="mt-4">
            <label class="mb-1 block text-xs font-medium text-muted-foreground" for="move-item-unit">Target Unit</label>
            <select id="move-item-unit"
                    class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-ring">
                <option value="">Select a unit...</option>
                {# Options populated by JS from user's units #}
            </select>
        </div>

        <div class="mt-6 flex gap-3">
            <button type="button" id="move-item-cancel"
                    class="flex-1 rounded-md border border-border bg-background px-4 py-2.5 text-sm font-medium text-foreground hover:bg-accent">
                Cancel
            </button>
            <button type="button" id="move-item-submit"
                    class="flex-1 rounded-md bg-primary px-4 py-2.5 text-sm font-medium text-primary-foreground hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
                Move
            </button>
        </div>
    </div>
</dialog>
