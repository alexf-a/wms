{# Edit item dialog — update name and description. #}
<dialog id="edit-item-dialog"
        class="w-full max-w-md rounded-lg border border-border bg-card p-0 text-card-foreground shadow-xl backdrop:bg-foreground/40
               open:animate-[dialog-in_200ms_ease-out]
               [&.dialog--closing]:animate-[dialog-out_150ms_ease-in]">
    <div class="px-6 py-5">
        <h2 class="text-lg font-semibold text-foreground">Edit Item</h2>

        <p id="edit-item-error" class="mt-3 hidden rounded-lg bg-destructive/10 px-4 py-3 text-sm text-destructive" role="alert"></p>

        <div class="mt-4 space-y-4">
            <div>
                <label class="mb-1 block text-xs font-medium text-muted-foreground" for="edit-item-name">Name</label>
                <input type="text" id="edit-item-name"
                       class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
                       required>
            </div>
            <div>
                <label class="mb-1 block text-xs font-medium text-muted-foreground" for="edit-item-desc">Description</label>
                <textarea id="edit-item-desc" rows="3"
                          class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"></textarea>
            </div>
        </div>

        <div class="mt-6 flex gap-3">
            <button type="button" id="edit-item-cancel"
                    class="flex-1 rounded-md border border-border bg-background px-4 py-2.5 text-sm font-medium text-foreground hover:bg-accent">
                Cancel
            </button>
            <button type="button" id="edit-item-submit"
                    class="flex-1 rounded-md bg-primary px-4 py-2.5 text-sm font-medium text-primary-foreground hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
                Save
            </button>
        </div>
    </div>
</dialog>

{# Delete item confirmation dialog. #}
<dialog id="delete-item-dialog"
        class="w-full max-w-sm rounded-lg border border-border bg-card p-0 text-card-foreground shadow-xl backdrop:bg-foreground/40
               open:animate-[dialog-in_200ms_ease-out]
               [&.dialog--closing]:animate-[dialog-out_150ms_ease-in]">
    <div class="px-6 py-5">
        <h2 class="text-lg font-semibold text-foreground">Delete Item</h2>
        <p class="mt-2 text-sm text-muted-foreground">
            Are you sure you want to delete <strong id="delete-item-name" class="text-foreground"></strong>? This action cannot be undone.
        </p>

        <p id="delete-item-error" class="mt-3 hidden rounded-lg bg-destructive/10 px-4 py-3 text-sm text-destructive" role="alert"></p>

        <div class="mt-6 flex gap-3">
            <button type="button" id="delete-item-cancel"
                    class="flex-1 rounded-md border border-border bg-background px-4 py-2.5 text-sm font-medium text-foreground hover:bg-accent">
                Cancel
            </button>
            <button type="button" id="delete-item-submit"
                    class="flex-1 rounded-md bg-destructive px-4 py-2.5 text-sm font-medium text-white hover:bg-destructive/90 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
                Delete
            </button>
        </div>
    </div>
</dialog>
