{# Edit Location dialog — name + address, pre-populated by JS. #}
<dialog id="edit-location-dialog"
        class="w-full max-w-md rounded-lg border border-border bg-card p-0 text-card-foreground shadow-xl backdrop:bg-foreground/40
               open:animate-[dialog-in_200ms_ease-out]
               [&.dialog--closing]:animate-[dialog-out_150ms_ease-in]">
    <div class="px-6 py-5">
        <h2 class="text-lg font-semibold text-foreground">Edit Location</h2>

        <input type="hidden" id="edit-location-id">

        <p id="edit-location-error" class="mt-3 hidden rounded-lg bg-destructive/10 px-4 py-3 text-sm text-destructive" role="alert"></p>

        <div class="mt-4 space-y-4">
            <div>
                <label class="mb-1 block text-xs font-medium text-muted-foreground" for="edit-location-name">Name</label>
                <input type="text" id="edit-location-name"
                       class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
                       placeholder="Location name" required>
            </div>
            <div>
                <label class="mb-1 block text-xs font-medium text-muted-foreground" for="edit-location-address">Address <span class="text-muted-foreground/60">(optional)</span></label>
                <input type="text" id="edit-location-address"
                       class="w-full rounded-md border border-input bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
                       placeholder="e.g. 123 Main St">
            </div>
        </div>

        <div class="mt-6 flex gap-3">
            <button type="button" id="edit-location-cancel"
                    class="flex-1 rounded-md border border-border bg-background px-4 py-2.5 text-sm font-medium text-foreground hover:bg-accent">
                Cancel
            </button>
            <button type="button" id="edit-location-submit"
                    class="flex-1 rounded-md bg-primary px-4 py-2.5 text-sm font-medium text-primary-foreground hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
                Save
            </button>
        </div>
    </div>
</dialog>
