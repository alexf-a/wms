{# Item detail bottom sheet — shows full item info when clicking an item card. #}
<dialog id="item-detail-sheet"
        class="fixed inset-x-0 bottom-0 top-auto m-0 w-full max-w-full rounded-t-2xl border-t border-border bg-card p-0 text-card-foreground shadow-xl backdrop:bg-foreground/40
               open:animate-[sheet-up_250ms_ease-out]
               [&.dialog--closing]:animate-[sheet-down_200ms_ease-in]">
    <div class="px-6 pb-6 pt-3">
        <!-- Drag handle -->
        <div class="mx-auto mb-4 h-1 w-10 rounded-full bg-muted-foreground/30"></div>

        <!-- Loading state -->
        <div id="item-detail-loading" class="py-8 text-center">
            <div class="mx-auto h-6 w-6 animate-spin rounded-full border-2 border-muted border-t-primary"></div>
        </div>

        <!-- Content (populated by JS) -->
        <div id="item-detail-content" class="hidden">
            <!-- Image -->
            <div id="item-detail-image-wrap" class="mb-4 hidden">
                <img id="item-detail-image" src="" alt="" class="h-40 w-full rounded-lg object-cover">
            </div>

            <!-- Name + actions row -->
            <div class="flex items-start justify-between gap-3">
                <h2 id="item-detail-name" class="text-lg font-semibold text-foreground"></h2>
                <div class="flex shrink-0 gap-1">
                    <button type="button" id="item-detail-edit-btn" class="rounded-md p-1.5 text-muted-foreground hover:bg-accent hover:text-foreground" aria-label="Edit item">
                        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                        </svg>
                    </button>
                    <button type="button" id="item-detail-move-btn" class="rounded-md p-1.5 text-muted-foreground hover:bg-accent hover:text-foreground" aria-label="Move item">
                        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"/>
                        </svg>
                    </button>
                    <button type="button" id="item-detail-delete-btn" class="rounded-md p-1.5 text-muted-foreground hover:bg-destructive/10 hover:text-destructive" aria-label="Delete item">
                        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Description -->
            <p id="item-detail-desc" class="mt-2 text-sm text-muted-foreground"></p>

            <!-- Quantity -->
            <div id="item-detail-qty-wrap" class="mt-3 hidden">
                <span class="text-xs font-medium text-muted-foreground">Quantity</span>
                <p id="item-detail-qty" class="text-sm text-foreground"></p>
            </div>

            <!-- Unit -->
            <div class="mt-3">
                <span class="text-xs font-medium text-muted-foreground">Stored in</span>
                <p id="item-detail-unit" class="text-sm text-foreground"></p>
            </div>

            <!-- View full page link -->
            <a id="item-detail-link" href="#" class="mt-4 block text-center text-xs text-primary hover:underline">View full details</a>
        </div>
    </div>
</dialog>
