{# Toast / snackbar for Django messages framework #}
{# Renders all messages as dismissible toasts fixed above bottom nav #}
{% if messages %}
<div id="toast-container" class="fixed inset-x-0 bottom-20 z-50 flex flex-col items-center gap-2 px-6 pointer-events-none">
    {% for message in messages %}
    <div class="toast pointer-events-auto flex w-full max-w-sm items-center gap-3 rounded-lg border px-4 py-3 shadow-lg transition-all duration-300
        {% if message.tags == 'success' %}border-primary/30 bg-primary/10 text-foreground{% elif message.tags == 'error' %}border-destructive/30 bg-destructive/10 text-foreground{% elif message.tags == 'warning' %}border-yellow-500/30 bg-yellow-500/10 text-foreground{% else %}border-accent/30 bg-accent/10 text-foreground{% endif %}"
         role="alert"
         data-toast>
        <span class="flex-1 text-sm">{{ message }}</span>
        <button type="button"
                class="shrink-0 text-muted-foreground hover:text-foreground"
                aria-label="Dismiss"
                onclick="this.closest('[data-toast]').remove()">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
<script>
(function () {
    // Auto-dismiss toasts after 5 seconds
    document.querySelectorAll('[data-toast]').forEach(function (toast) {
        setTimeout(function () {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(8px)';
            setTimeout(function () { toast.remove(); }, 300);
        }, 5000);
    });
})();
</script>
{% endif %}
